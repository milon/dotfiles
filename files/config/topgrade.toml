# Topgrade config for `dotfiles update` (and ~/.config when symlinked).
# See: topgrade --config-reference

[misc]
# Skip pulling predefined / extra git repos (use `dotfiles pull` instead)
# Skip GitHub CLI extension updates
# Skip Docker/Podman image pulls for configured containers
# Built-in Composer step disabled — use [commands] only (avoids duplicate global update)
# Skip node (npm global), Yarn, and Deno (manage via mise or manually)
disable = ["git_repos", "github_cli_extensions", "containers", "composer", "node", "yarn", "deno", "rustup", "pip3", "pnpm"]
assume_yes = true
cleanup = true

[commands]
"Composer" = "composer self-update && composer global update"
